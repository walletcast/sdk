<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalletCast — Vanilla Example</title>
  <style>
    body { font-family: monospace; max-width: 640px; margin: 4rem auto; padding: 1rem; background: #0d0d0d; color: #d4d4d4; }
    h1 { color: #818cf8; margin-bottom: 0.25rem; }
    p { color: #6b7280; margin-bottom: 2rem; font-size: 0.875rem; }
    button { background: #4f46e5; color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .disconnect-btn { background: #7f1d1d; margin-left: 0.5rem; }
    .disconnect-btn:hover { background: #991b1b; }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    #account { margin-top: 1.5rem; display: none; }
    #account span { color: #818cf8; }
    #log { margin-top: 2rem; font-size: 0.8rem; line-height: 1.8; color: #6b7280; }
    #log .ok  { color: #4ade80; }
    #log .err { color: #f87171; }
    .type-badge { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 0.1rem 0.4rem; font-size: 0.75rem; color: #818cf8; }
    #actions { margin-top: 1.5rem; display: none; }
    .action-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; font-size: 0.85rem; padding: 0.5rem 1rem; }
    .action-btn:hover { background: #334155; color: #e2e8f0; }
    select.account-select {
      background: #1a1a1a; color: #d4d4d4; border: 1px solid #333; border-radius: 4px;
      padding: 0.2rem 0.4rem; font-family: monospace; font-size: 0.85rem; cursor: pointer;
    }
    select.account-select:hover { border-color: #818cf8; }
    .add-btn { background: none; border: 1px dashed #333; color: #6b7280; font-size: 0.75rem; padding: 0.3rem 0.6rem; }
    .add-btn:hover { border-color: #818cf8; color: #818cf8; }
  </style>
</head>
<body>
  <h1>WalletCast</h1>
  <p>Minimal vanilla-JS wallet connection — no build step required.<br>
  Auto-detects injected wallets. Shows QR modal if none found.</p>

  <div class="btn-row">
    <button id="connect">Connect Wallet</button>
    <button id="disconnect" class="disconnect-btn" style="display:none">Disconnect</button>
  </div>

  <div id="account">
    Account: <select id="accountSelect" class="account-select"></select>
    <button id="addAccountBtn" class="add-btn">+ more</button>
    &nbsp;|&nbsp; Chain: <span id="chain"></span> &nbsp;|&nbsp; <span class="type-badge" id="connType"></span>
  </div>

  <div id="actions">
    <div class="btn-row">
      <button id="sendBtn" class="action-btn">Send 0 ETH to self</button>
      <button id="signBtn" class="action-btn">Sign random message</button>
    </div>
  </div>

  <div id="log"></div>

  <!--
    Import WalletCast from the built SDK.
    Run from the repo root:
      pnpm build
      pnpm --filter @walletcast/sdk build:browser
      npx serve .
    Once published to npm:
      import { WalletCast } from 'https://esm.sh/@walletcast/sdk';
  -->
  <script type="module">
    import { WalletCast } from '../../packages/sdk/dist/browser/index.js';

    const $ = (id) => document.getElementById(id);
    let disconnectFn = null;
    let provider = null;
    let currentAccount = null;

    const fmt = (a) => `${a.slice(0, 6)}...${a.slice(-4)}`;
    const log = (msg, cls = '') => {
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      $('log').prepend(div);
    };

    function populateAccounts(accounts, selected) {
      const sel = $('accountSelect');
      sel.innerHTML = '';
      for (const addr of accounts) {
        const opt = document.createElement('option');
        opt.value = addr;
        opt.textContent = fmt(addr);
        if (addr === selected) opt.selected = true;
        sel.appendChild(opt);
      }
      currentAccount = sel.value;
    }

    $('accountSelect').addEventListener('change', (e) => {
      currentAccount = e.target.value;
      log(`Active account: ${fmt(currentAccount)}`, 'ok');
    });

    $('addAccountBtn').addEventListener('click', async () => {
      if (!provider) return;
      $('addAccountBtn').disabled = true;
      log('Requesting wallet permissions...');
      try {
        await provider.request({
          method: 'wallet_requestPermissions',
          params: [{ eth_accounts: {} }],
        });
        const accounts = await provider.request({ method: 'eth_accounts' });
        if (accounts.length > 0) {
          populateAccounts(accounts, accounts[0]);
          log(`Accounts: ${accounts.map(fmt).join(', ')}`, 'ok');
        }
      } catch (err) {
        log(`Permission error: ${err.message}`, 'err');
      } finally {
        $('addAccountBtn').disabled = false;
      }
    });

    $('connect').addEventListener('click', async () => {
      $('connect').disabled = true;
      $('connect').textContent = 'Connecting...';

      try {
        const result = await WalletCast.connect();

        disconnectFn = result.disconnect;
        provider = result.provider;

        populateAccounts(result.accounts, result.accounts[0]);

        log(`Connected via ${result.type}! ${result.accounts.map(fmt).join(', ')}`, 'ok');
        $('chain').textContent = parseInt(result.chainId, 16);
        $('connType').textContent = result.type;
        $('account').style.display = 'block';
        $('actions').style.display = 'block';
        $('connect').style.display = 'none';
        $('disconnect').style.display = 'inline-block';

        result.provider.on('accountsChanged', (accs) => {
          if (accs.length > 0) {
            populateAccounts(accs, accs[0]);
            log(`Accounts changed: ${accs.map(fmt).join(', ')}`, 'ok');
          }
        });

        result.provider.on('disconnect', () => {
          log('Disconnected', 'err');
          provider = null;
          currentAccount = null;
          $('account').style.display = 'none';
          $('actions').style.display = 'none';
          $('connect').style.display = 'inline-block';
          $('connect').disabled = false;
          $('connect').textContent = 'Connect Wallet';
          $('disconnect').style.display = 'none';
        });
      } catch (err) {
        log(`Error: ${err.message}`, 'err');
        $('connect').disabled = false;
        $('connect').textContent = 'Connect Wallet';
      }
    });

    $('disconnect').addEventListener('click', async () => {
      if (disconnectFn) {
        await disconnectFn({ revoke: true });
        disconnectFn = null;
      }
      provider = null;
      currentAccount = null;
      $('account').style.display = 'none';
      $('actions').style.display = 'none';
      $('connect').style.display = 'inline-block';
      $('connect').disabled = false;
      $('connect').textContent = 'Connect Wallet';
      $('disconnect').style.display = 'none';
      log('Disconnected (permissions revoked)');
    });

    $('sendBtn').addEventListener('click', async () => {
      if (!provider || !currentAccount) return;
      $('sendBtn').disabled = true;
      try {
        const txHash = await provider.request({
          method: 'eth_sendTransaction',
          params: [{ from: currentAccount, to: currentAccount, value: '0x0', gas: '0x5208' }],
        });
        log(`Tx sent: ${txHash}`, 'ok');
      } catch (err) {
        log(`Tx error: ${err.message}`, 'err');
      } finally {
        $('sendBtn').disabled = false;
      }
    });

    $('signBtn').addEventListener('click', async () => {
      if (!provider || !currentAccount) return;
      $('signBtn').disabled = true;
      try {
        const msg = `WalletCast test message \u2014 ${new Date().toISOString()}`;
        const sig = await provider.request({
          method: 'personal_sign',
          params: [msg, currentAccount],
        });
        log(`Signed: ${sig.slice(0, 20)}...`, 'ok');
      } catch (err) {
        log(`Sign error: ${err.message}`, 'err');
      } finally {
        $('signBtn').disabled = false;
      }
    });

    log('WalletCast vanilla example loaded');
  </script>
</body>
</html>
