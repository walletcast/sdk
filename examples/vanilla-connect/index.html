<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalletCast — Vanilla Example</title>
  <style>
    body { font-family: monospace; max-width: 640px; margin: 4rem auto; padding: 1rem; background: #0d0d0d; color: #d4d4d4; }
    h1 { color: #818cf8; margin-bottom: 0.25rem; }
    p { color: #6b7280; margin-bottom: 2rem; font-size: 0.875rem; }
    button { background: #4f46e5; color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .disconnect-btn { background: #7f1d1d; margin-left: 0.5rem; }
    .disconnect-btn:hover { background: #991b1b; }
    .btn-row { display: flex; gap: 0.5rem; }
    #account { margin-top: 1.5rem; display: none; }
    #account span { color: #818cf8; }
    #log { margin-top: 2rem; font-size: 0.8rem; line-height: 1.8; color: #6b7280; }
    #log .ok  { color: #4ade80; }
    #log .err { color: #f87171; }
    .type-badge { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 0.1rem 0.4rem; font-size: 0.75rem; color: #818cf8; }
  </style>
</head>
<body>
  <h1>WalletCast</h1>
  <p>Minimal vanilla-JS wallet connection — no build step required.<br>
  Auto-detects injected wallets. Shows QR modal if none found.</p>

  <div class="btn-row">
    <button id="connect">Connect Wallet</button>
    <button id="disconnect" class="disconnect-btn" style="display:none">Disconnect</button>
  </div>

  <div id="account">
    Account: <span id="addr"></span> &nbsp;|&nbsp; Chain: <span id="chain"></span> &nbsp;|&nbsp; <span class="type-badge" id="connType"></span>
  </div>

  <div id="log"></div>

  <!--
    Import WalletCast from the built SDK.
    Run from the repo root:
      pnpm build
      pnpm --filter @walletcast/sdk build:browser
      npx serve .
    Once published to npm:
      import { WalletCast } from 'https://esm.sh/@walletcast/sdk';
  -->
  <script type="module">
    import { WalletCast } from '../../packages/sdk/dist/browser/index.js';

    const $ = (id) => document.getElementById(id);
    let disconnectFn = null;

    const log = (msg, cls = '') => {
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      $('log').prepend(div);
    };

    $('connect').addEventListener('click', async () => {
      $('connect').disabled = true;
      $('connect').textContent = 'Connecting...';

      try {
        const result = await WalletCast.connect({
          rpcUrl: 'https://eth.llamarpc.com',
          chainId: 1,
        });

        disconnectFn = result.disconnect;
        const addr = result.accounts[0];

        log(`Connected via ${result.type}! ${addr}`, 'ok');
        $('addr').textContent = `${addr.slice(0, 6)}...${addr.slice(-4)}`;
        $('chain').textContent = parseInt(result.chainId, 16);
        $('connType').textContent = result.type;
        $('account').style.display = 'block';
        $('connect').style.display = 'none';
        $('disconnect').style.display = 'inline-block';

        result.provider.on('accountsChanged', ([a]) => {
          if (a) {
            $('addr').textContent = `${a.slice(0, 6)}...${a.slice(-4)}`;
            log(`Account: ${a}`, 'ok');
          }
        });

        result.provider.on('disconnect', () => {
          log('Disconnected', 'err');
          $('account').style.display = 'none';
          $('connect').style.display = 'inline-block';
          $('connect').disabled = false;
          $('connect').textContent = 'Connect Wallet';
          $('disconnect').style.display = 'none';
        });
      } catch (err) {
        log(`Error: ${err.message}`, 'err');
        $('connect').disabled = false;
        $('connect').textContent = 'Connect Wallet';
      }
    });

    $('disconnect').addEventListener('click', async () => {
      if (disconnectFn) {
        await disconnectFn();
        disconnectFn = null;
      }
      $('account').style.display = 'none';
      $('connect').style.display = 'inline-block';
      $('connect').disabled = false;
      $('connect').textContent = 'Connect Wallet';
      $('disconnect').style.display = 'none';
      log('Disconnected');
    });

    log('WalletCast vanilla example loaded');
  </script>
</body>
</html>
